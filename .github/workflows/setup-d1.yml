name: Setup D1

on:
  workflow_dispatch:

jobs:
  setup-d1:
    name: Setup D1 database and Pages binding
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PAGES_PROJECT_NAME_FILE: .cloudflare-pages-project-name
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load site request
        run: python .github/scripts/load-site-request.py

      - name: Reserve Cloudflare Pages project name
        run: python .github/scripts/ensure-cloudflare-pages-project.py
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Setup D1
        run: python .github/scripts/setup-d1.py
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_NAME: workout-profiles
          D1_BINDING_NAME: DB
